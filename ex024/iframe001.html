    <title>iframe</title>
    <style>
        p{

        iframe{

        }

</head>
<body>
    <h1>testando o uso de iframe</h1>

    <!--tamanho padrao 300x150 px-->

        acessando o site do
        <iframe src="https://www.cursoemvideo.com" 
        frameborder="0">

    </iframe>
        
        
        para aprender a progamar
    </p><!--deixa uma mine pagina inline-->
    <p>
        O Repositorio do Guanabara

    </p>

</html>
