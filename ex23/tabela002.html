<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>batelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            width: 500px;
            border-collapse: collapse;
        }
        caption{
            font-size: 1.5em;
        }
        td,th{
            border: 1px solid black;
            padding: 10px;
        }
        thead{
            background-color: gray;
            color: white;
        }
        tbody tr:nth-child(2n){/*faz zebrado na tabela*/
            background-color: lightgrey;
        }
    </style>
</head>
<body>
    <h1>uso de tabelas grandes</h1>
   <!--
    HIERAQUIA DE TABELAS (simples)
    TABLE= tabela
    TABLE ROW = linha de tabela
    TABLE HEADER = cabeçario de tabela
    TABLE DATA= dado de tabela
    caption 
    thad; tr, td, th
    tbody; tr,td,th
    troot;tr,td,th
    -->
    <table>
        <caption>
            populaçoes 
        </caption>
        <thead>
            <tr>
                <th>Estado</th>
                <th>Populaçao</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Sao Paulo</td>
                <td>45 919 049</td>
            </tr>
            <tr>
                 <td>Minas gerais</td>
                 <td>21 168 791</td>
            </tr>
            <tr>
                <td>Rio de janeiro</td>
                <td>17 264 943</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th>Total de habitante</th>
                <th>0000</th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
