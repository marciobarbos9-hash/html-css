<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
     <h1>Exemplo de Formulario</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
<p>
    <label for="iest">Estado</label>
    <select name="est" id="iest">
        <option value="RJ">Rio de janeiro</option>
        <option value="MG">Minas Gerais</option>
        <option value="SP">Sao Paulo</option>
        
    </select>
</p>
<p>
    <label for="iprof">Profissao</label>
   <input type="text" name="prof" id="iprof" list="iprof-list">

   

   
        <datalist id="iprof-list">
            <option value="ADM">Administraçao</option>
            <option value="CONT">Contador</option>
            <option value="DEV">Desenvolvedor</option>
            <option value="PROF">Professor</option>
        </datalist>
    

   
</p>
<p>
    <label for="imsg">mensagem</label>
    <br>
   <textarea name="msg" id="imsg" cols="30" rows="10"></textarea>
</p>







    <p>
    <input type="submit" value="Enviar">
    <br>
    <input type="reset" value="Limpar">
</p>
    </form>
</body>
</html>
