<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Exemplo de Formulario</h1>
    <form action="cadastro.php" method="get">
<fieldset>
    <legend>Dados Pessoais</legend>
    <p>
        <label for="iemail">E-mail:</label>
        <input type="email" name="email" id="iemail" autocomplete="email" required placeholder="email">
    </p>
    <p>
        <label for="itel">Tel:</label>
    <input type="tel" name="tel" id="itel" autocomplete="tel" required placeholder="(xx)xxxxx-xxxx">
    </p>
</fieldset>
<input type="submit" value="Enviar">


    </form>
</body>
</html>
