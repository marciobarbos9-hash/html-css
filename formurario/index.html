<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login">
        <h1>Login</h1>
           <form>
        <label class="label" for="email">E-mail:</label>
        <input class="input" id="email" type="email" placeholder="Digite seu E-mail" required>
        <br>
        <label class="label" for="senha">Senha:</label>
        <input class="input" type="password" placeholder="Digite sua senha" required>
        
            <input class="lembrar" id="chec" type="checkbox">
            <label class="lembar" for="chec">Lembre-me</label>
        
       
        <br>
        <input class="botao " type="submit" value="Login">
        
           </form>
    </div>
</body>
</html>
